version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: remote-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - remote-net

  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: remote-meshcentral
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "80:80"
      - "443:443"
    environment:
      - HOSTNAME=${HOSTNAME:-10.158.81.4}
      - REVERSE_PROXY=false
      - IFRAME=false
      - ALLOW_NEW_ACCOUNTS=false
      - WEBRTC=true
      - SESSION_KEY=${SESSION_KEY:?Set SESSION_KEY in .env}
      - MONGO_URL=mongodb://mongo:27017/meshcentral
    volumes:
      - ./meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-userfiles:/opt/meshcentral/meshcentral-files
      - meshcentral-backup:/opt/meshcentral/meshcentral-backups
    networks:
      - remote-net

networks:
  remote-net:
    driver: bridge

volumes:
  mongo-data:
  meshcentral-userfiles:
  meshcentral-backup:
