version: "3.9"

services:
  meshagent:
    build:
      context: .
      dockerfile: Dockerfile.meshagent
    container_name: meshagent-client
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - MESH_AGENT_URL=${MESH_AGENT_URL}
      - MESH_DEVICE_NAME=${MESH_DEVICE_NAME:-docker-linux-client}
    volumes:
      - meshagent-state:/var/lib/meshagent

volumes:
  meshagent-state:
